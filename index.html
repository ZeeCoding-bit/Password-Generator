<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Password Generator</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="box">
  <h2 id="heading">Password Generator</h2>

  Length:
  <input type="number" id="length" value="12" min="4" max="50">

  <br><br>

  <label><input type="checkbox" id="upper" checked> Uppercase</label><br>
  <label><input type="checkbox" id="lower" checked> Lowercase</label><br>
  <label><input type="checkbox" id="number" checked> Numbers</label><br>
  <label><input type="checkbox" id="symbol"> Symbols</label><br>

  <button id="gen-btn" onclick="generatePassword()">Generate</button>

  <div id="result"></div>
</div>

<script src="script.js"></script>

</body>
</html>
